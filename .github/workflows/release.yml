name: Release Candidate

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm lint
          pnpm format:check
          pnpm test:run
          pnpm typecheck
          pnpm build
          pnpm pack:check

      - name: Create Package Artifact
        run: npm pack --json

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: recall-os-package
          path: recall-os-*.tgz
